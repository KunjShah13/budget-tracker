<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Tracker - Splits</title>
  <base href="/budget/">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>💰 Split Statement</h1>
    <nav>
      <select id="month-selector"></select>
      <a href="./" class="btn-secondary" style="display:inline-block; text-align:center; text-decoration:none;">Back to Tracker</a>
      <button id="logout-btn">Logout</button>
    </nav>
  </header>
  
  <main class="splits-container">
    <div class="split-card">
      <h2 id="split-count-title">📋 Shared Expenses (0)</h2>
      <div id="split-transactions-list">
        <!-- Rendered by JS -->
      </div>
    </div>
    
    <div class="settlement-card">
      <h2>💰 Net Settlement</h2>
      <div id="settlement-list">
        <!-- Rendered by JS -->
      </div>
      <div class="net-summary" id="net-summary">
        <!-- Overall summary -->
      </div>
    </div>
  </main>
  
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/splits.js"></script>
</body>
</html>
